name: 🚀 Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── JDK ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'           # caches ~/.gradle between runs

      # ── Gradle wrapper ────────────────────────────────────────
      - name: Validate Gradle wrapper
        uses: gradle/wrapper-validation-action@v2

      # ── Gradle cache (dependencies + build outputs) ───────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Permissions ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
               --no-daemon
               --build-cache
               --parallel
               --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # ── Upload artifact ───────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FTTSignal-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error   # fail loudly if APK is missing
