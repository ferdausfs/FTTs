name: 🚀 Build Debug APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Upload Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── JDK ───────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ── Download Gradle Wrapper JAR (if missing) ──────────────
      # Direct download avoids running `gradle wrapper` which would
      # evaluate the project with the system Gradle (9.x) and fail.
      - name: Download Gradle Wrapper JAR
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            echo "gradle-wrapper.jar not found, downloading..."
            curl -sL \
              "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
            echo "✅ gradle-wrapper.jar downloaded ($(du -sh gradle/wrapper/gradle-wrapper.jar | cut -f1))"
          else
            echo "✅ gradle-wrapper.jar already present"
          fi

      # ── Gradle cache ──────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # ── Permissions ───────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x gradlew

      # ── Build ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
               --no-daemon
               --build-cache
               --parallel
               --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2g -Dorg.gradle.daemon=false"

      # ── Upload artifact ───────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FTTSignal-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
